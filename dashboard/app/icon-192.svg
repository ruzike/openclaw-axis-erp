<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <rect x="20" y="20" width="152" height="152" rx="28" fill="url(#accent)" opacity="0.15"/>
  <!-- A letter -->
  <text x="96" y="125" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="90" fill="url(#accent)" text-anchor="middle">A</text>
  <!-- Glow dots -->
  <circle cx="52" cy="52" r="6" fill="#7c3aed" opacity="0.8"/>
  <circle cx="140" cy="52" r="4" fill="#4f46e5" opacity="0.6"/>
  <circle cx="52" cy="140" r="4" fill="#4f46e5" opacity="0.6"/>
  <circle cx="140" cy="140" r="6" fill="#7c3aed" opacity="0.8"/>
</svg>
